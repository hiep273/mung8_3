<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi một người đặc biệt</title>
    <!-- Thêm font chữ đẹp từ Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Đổ bóng nền màu hồng pastel cực nhẹ và mượt */
            background: linear-gradient(135deg, #ffe0e9 0%, #ffebf0 50%, #fad0e0 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Khung kính bóng mờ hiện đại (Glassmorphism) */
        .container {
            z-index: 10;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 135, 0.15);
            max-width: 90%;
            width: 450px;
            /* Hoạt ảnh lอย nhẹ trên không */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 3.2rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(232, 62, 140, 0.15);
        }

        .btn {
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            /* Nút bấm chuyển màu (gradient) đep mắt */
            background: linear-gradient(45deg, #ff4b72, #ff758f);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
            transition: all 0.3s ease;
            /* Hiệu ứng nhấp nháy thôi thúc người bấm */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 12px 20px rgba(255, 77, 109, 0.5);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
            }
        }

        .btn:hover {
            transform: scale(1.08) translateY(-2px);
            background: linear-gradient(45deg, #ff2a55, #ff5c77);
            box-shadow: 0 15px 25px rgba(255, 77, 109, 0.5);
            animation: none;
            /* Dừng nháy khi di chuột vào */
        }

        /* Hiệu ứng mượt cho khung thông báo chung */
        #message {
            display: none;
            margin-top: 10px;
            animation: reveal 1s ease-out forwards;
        }

        @keyframes reveal {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* --- HIỆU ỨNG TỪNG DÒNG CHỮ --- */
        #message h2,
        #message p {
            opacity: 0;
            /* Ban đầu ẩn */
            animation: textFadeIn 1.5s ease-out forwards;
        }

        /* Tăng dần độ trễ cho từng khối */
        #message h2 {
            animation-delay: 0.5s;
        }

        #message p:nth-of-type(1) {
            animation-delay: 2s;
        }

        #message p.highlight {
            animation-delay: 5s;
        }

        @keyframes textFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: #d62828;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(214, 40, 40, 0.2);
        }

        p {
            color: #4a4a4a;
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 15px;
            font-weight: 500;
        }

        p.highlight {
            color: #c9184a;
            font-weight: 700;
            font-size: 1.3rem;
            margin-top: 25px;
            letter-spacing: 0.5px;
        }

        /* Phong cách cho những icon rơi (trái tim, hoa) */
        .heart {
            position: absolute;
            user-select: none;
            animation: fall linear forwards;
            z-index: 0;
            pointer-events: none;
            /* Không làm ảnh hưởng khi click nht */
        }

        @keyframes fall {
            0% {
                transform: translateY(-15vh) rotate(0deg) scale(0.1);
                opacity: 0;
            }

            15% {
                opacity: 1;
                transform: translateY(10vh) rotate(45deg) scale(0.5);
            }

            50% {
                opacity: 1;
                transform: translateY(50vh) rotate(180deg) scale(1);
            }

            85% {
                opacity: 1;
                transform: translateY(90vh) rotate(270deg) scale(1.3);
            }

            100% {
                transform: translateY(115vh) rotate(360deg) scale(1.6);
                opacity: 0;
            }
        }

        /* --- TRÁI TIM LỚN BAO QUANH LỜI CHÚC --- */
        .big-heart-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            /* Ban đầu ẩn */
            z-index: 5;
            /* Nằm dưới khung chữ */
            pointer-events: none;
        }

        .big-heart {
            position: relative;
            width: 100px;
            height: 90px;
            animation: growHeart 2s ease-out forwards;
        }

        /* Cách tạo hình trái tim bằng CSS */
        .big-heart::before,
        .big-heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 50px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            background: rgba(255, 77, 109, 0.4);
            /* Màu trái tim làm nền */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.5);
        }

        .big-heart::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .big-heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes growHeart {
            0% {
                transform: scale(0.1);
                /* Xuất hiện rất nhỏ từ giữa */
                opacity: 0;
            }

            40% {
                opacity: 1;
                transform: scale(2);
            }

            100% {
                /* Phóng to cực đại ôm trọn khung chữ */
                transform: scale(8.5);
                opacity: 1;
            }
        }

        /* Chỉnh lại 1 chút cho chữ thật rõ trên nền trái tim */
        #message {
            position: relative;
            z-index: 20;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI & TABLET --- */
        @media screen and (max-width: 768px) {
            .container {
                width: 90%;
                padding: 30px 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 2.5rem;
                margin-bottom: 20px;
            }

            h2 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
                line-height: 1.5;
            }

            p.highlight {
                font-size: 1.15rem;
                margin-top: 15px;
            }

            .btn {
                padding: 12px 28px;
                font-size: 1rem;
            }

            @keyframes growHeart {
                0% {
                    transform: scale(0.1);
                    opacity: 0;
                }

                40% {
                    opacity: 1;
                    transform: scale(1.2);
                }

                100% {
                    /* Trên điện thoại, thu nhỏ độ phóng to chỉ còn khoảng 3.5 đến 4 */
                    transform: scale(4);
                    opacity: 1;
                }
            }
        }

        /* --- HIỆU ỨNG RÈM CỬA --- */
        #curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            /* Gradient đỏ nhung như rèm sân khấu */
            background: linear-gradient(to right, #8a0c20, #e01b3c, #8a0c20);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            transition: transform 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Texture vải rèm nếp gấp */
            background-image: repeating-linear-gradient(90deg,
                    rgba(0, 0, 0, 0.15) 0px,
                    transparent 20px,
                    rgba(0, 0, 0, 0.15) 40px);
        }

        #curtain-text {
            color: #ffd700;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 50px;
            font-weight: 700;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
            animation: pulseText 1.5s infinite;
            letter-spacing: 1px;
        }

        @keyframes pulseText {

            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        #rope {
            position: relative;
            bottom: 0;
            width: 80px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: grab;
            animation: bounceRope 2s infinite;
            z-index: 101;
            touch-action: none;
            /* Tránh cuộn trang trên điện thoại */
        }

        #rope:active {
            cursor: grabbing;
        }

        @keyframes bounceRope {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(15px);
            }
        }

        .rope-line {
            width: 6px;
            height: 100px;
            background: #d4a373;
            border-radius: 3px;
            box-shadow: inset -2px 0 4px rgba(0, 0, 0, 0.3);
        }

        .rope-handle {
            width: 50px;
            height: 50px;
            background: #e9c46a;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4), inset -5px -5px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #8a0c20;
            font-weight: 800;
            font-size: 0.9rem;
            text-align: center;
            margin-top: -5px;
            user-select: none;
            border: 2px solid #ffd700;
        }
    </style>
</head>

<body>

    <!-- Rèm cửa che phủ ban đầu -->
    <div id="curtain">
        <h3 id="curtain-text">Kéo nhẹ sợi dây xuống nhé ✨</h3>
        <div id="rope">
            <div class="rope-line"></div>
            <div class="rope-handle">KÉO</div>
        </div>
    </div>

    <!-- Khối trái tim lớn nằm dưới background container -->
    <div class="big-heart-wrapper" id="bgHeart">
        <div class="big-heart"></div>
    </div>

    <div class="container" id="mainContainer">
        <h1 id="title">Gửi chị Tú Vi</h1>

        <!-- Khung lời chúc sẽ hiện ra sau khi mở rèm -->
        <div id="message">
            <h2>Chúc mừng 8/3! 🌹</h2>
            <p>Em không giỏi nói những lời hoa mỹ như người ta,<br>
                nhưng em giỏi làm những thứ dành riêng cho chị.</p>
            <p class="highlight">Chúc chị luôn rạng rỡ và hạnh phúc nhé! ❤️</p>
        </div>
    </div>

    <script>
        // --- XỬ LÝ SỰ KIỆN KÉO RÈM CỬA ---
        let isDragging = false;
        let startY = 0;
        const curtain = document.getElementById('curtain');
        const rope = document.getElementById('rope');
        let isOpened = false;

        function onDragStart(e) {
            if (isOpened) return;
            isDragging = true;
            curtain.style.transition = 'none'; // Tắt transition để kéo mượt
            rope.style.animation = 'none'; // Tắt nhún nhảy khi đang kéo
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        }

        function onDragMove(e) {
            if (!isDragging || isOpened) return;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            let moveY = clientY - startY;

            // Khi kéo dây XUỐNG (moveY > 0), rèm di chuyển LÊN (translateY âm)
            if (moveY > 0) {
                curtain.style.transform = `translateY(-${moveY}px)`;

                // Kéo đủ 120px là mở rèm
                if (moveY > 120) {
                    openCurtain();
                }
            }
        }

        function onDragEnd() {
            if (!isDragging || isOpened) return;
            isDragging = false;

            // Đàn hồi lại nếu chưa kéo đủ lực
            curtain.style.transition = 'transform 0.5s cubic-bezier(0.25, 1.5, 0.5, 1)';
            curtain.style.transform = `translateY(0)`;
            rope.style.animation = 'bounceRope 2s infinite';
        }

        function openCurtain() {
            isOpened = true;
            isDragging = false;
            // Hiệu ứng rèm bay vút lên
            curtain.style.transition = 'transform 1s cubic-bezier(0.25, 1, 0.25, 1)';
            curtain.style.transform = 'translateY(-100vh)';

            setTimeout(() => {
                curtain.style.display = 'none';
            }, 1000);

            // Bắt đầu hiển thị nội dung chính
            showMessage();
        }

        // Gắn sự kiện kéo/thả cho sợi dây
        rope.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove, { passive: false });
        window.addEventListener('mouseup', onDragEnd);

        rope.addEventListener('touchstart', onDragStart, { passive: true });
        window.addEventListener('touchmove', onDragMove, { passive: false });
        window.addEventListener('touchend', onDragEnd);

        // --- HIỂN THỊ LỜI CHÚC SAU KHI MỞ RÈM ---
        function showMessage() {
            document.getElementById('bgHeart').style.display = 'block';
            document.getElementById('message').style.display = 'block';
            document.getElementById('title').style.display = 'none';

            const container = document.getElementById('mainContainer');
            container.style.padding = '50px 30px';
            container.style.background = 'transparent';
            container.style.border = 'none';
            container.style.boxShadow = 'none';
            container.style.backdropFilter = 'none';

            setInterval(createHeart, 250);

            for (let i = 0; i < 20; i++) {
                setTimeout(createHeart, Math.random() * 600);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');

            const iconList = ['❤️', '💖', '🌸', '✨', '💕', '🌷', '💝', '🎀'];
            heart.innerHTML = iconList[Math.floor(Math.random() * iconList.length)];
            heart.style.left = Math.random() * 100 + 'vw';

            const size = Math.random() * 1.5 + 0.8;
            heart.style.fontSize = (size * 22) + 'px';

            const duration = Math.random() * 5 + 3;
            heart.style.animationDuration = duration + 's';

            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, duration * 1000 + 1000);
        }
    </script>
</body>

</html>
